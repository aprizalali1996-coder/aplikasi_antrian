<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display - Antrean Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
            colors: {
              slate: "#0F172A",
              primary: "#2563EB",
              cyan: "#06B6D4",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0f172a;
      }
      .ambient-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        z-index: -1;
        background: #0f172a;
      }
      .ambient-glow-1 {
        position: absolute;
        top: -10%;
        left: -10%;
        width: 50vw;
        height: 50vw;
        background: radial-gradient(
          circle,
          rgba(37, 99, 235, 0.15) 0%,
          rgba(15, 23, 42, 0) 70%
        );
        border-radius: 50%;
        filter: blur(80px);
      }
      .ambient-glow-2 {
        position: absolute;
        bottom: -20%;
        right: -10%;
        width: 60vw;
        height: 60vw;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.1) 0%,
          rgba(15, 23, 42, 0) 70%
        );
        border-radius: 50%;
        filter: blur(100px);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 24px 40px -8px rgba(0, 0, 0, 0.3);
      }
      .text-glow {
        text-shadow: 0 0 40px rgba(6, 182, 212, 0.4);
      }
      .gradient-text {
        background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>
  <body
    class="text-white min-h-screen flex flex-col justify-center items-center font-sans antialiased selection:bg-cyan-500 selection:text-white relative px-4"
  >
    <!-- Ambient Background -->
    <div class="ambient-bg">
      <div class="ambient-glow-1"></div>
      <div class="ambient-glow-2"></div>
    </div>

    <!-- Header -->
    <header class="absolute top-12 left-0 w-full text-center px-8 z-10">
      <div
        class="inline-flex items-center space-x-3 bg-white/5 border border-white/10 px-6 py-2.5 rounded-full backdrop-blur-md"
      >
        <span class="w-2.5 h-2.5 rounded-full bg-cyan-400 animate-pulse"></span>
        <span
          class="text-sm font-medium tracking-widest uppercase text-slate-300"
          >Khitan Massal Gratis</span
        >
      </div>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-5xl mx-auto space-y-8 z-10 mt-12">
      <!-- Current Queue Hero Card -->
      <div
        class="glass-card rounded-[2rem] p-12 md:p-15 text-center relative overflow-hidden"
      >
        <!-- Subtle internal glow -->
        <div
          class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"
        ></div>

        <h2
          class="text-sm md:text-base font-bold text-cyan-400 uppercase tracking-[0.2em] mb-4"
        >
          Nomor Antrean Saat Ini
        </h2>

        <!-- Massive typography for numbers -->
        <div
          id="current-number"
          class="text-[8rem] md:text-[12rem] font-extrabold leading-none tracking-tighter text-glow gradient-text mb-8"
        >
          --
        </div>

        <!-- Sleek Name Badge -->
        <div class="inline-block relative">
          <div
            class="absolute inset-0 bg-primary/20 blur-xl rounded-full"
          ></div>
          <div
            id="current-name"
            class="relative bg-white/10 border border-white/20 backdrop-blur-xl px-8 py-4 rounded-2xl text-2xl md:text-3xl font-medium text-white shadow-xl"
          >
            Menunggu Panggilan...
          </div>
        </div>
      </div>

      <!-- Next Queue Card -->
      <div
        class="glass-card rounded-3xl p-8 max-w-3xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-6"
      >
        <div class="flex items-center space-x-4">
          <div
            class="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-slate-400"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 5l7 7-7 7M5 5l7 7-7 7"
              ></path>
            </svg>
          </div>
          <div class="text-left">
            <h3
              class="text-xs font-bold text-slate-400 uppercase tracking-widest"
            >
              Persiapan Berikutnya
            </h3>
            <p id="next-info" class="text-xl font-semibold text-slate-200 mt-1">
              Belum ada antrean
            </p>
          </div>
        </div>
        <div class="text-right hidden sm:block">
          <span class="text-sm text-slate-500">MOHON BERSIAP!!</span>
        </div>
      </div>
    </main>

    <script src="js/display.js"></script>
  </body>
</html>
