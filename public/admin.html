<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Antrian Premium Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },

            colors: {
              primary: "#2563EB",

              secondary: "#0EA5E9",

              dark: "#0F172A",
            },
          },
        },
      };
    </script>

    <style>
      body {
        background: #f1f5f9;
      }

      .card {
        background: #fff;

        border-radius: 24px;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }

        .darkmode{

        background:#0f172a;

        color:white;

        }

        .darkmode #nav{
        background:#0f172a;

        color:white;
        }

        .darkmode header{

        background:#111827 !important;

        }

        .darkmode .card{

        background:#1e293b !important;

        color:white !important;

        }

        .darkmode input{

        background:#0f172a !important;

        border:1px solid #334155 !important;

        color:white !important;

        }

        .darkmode table{

        color:white !important;

        }

        .darkmode thead{

        background:#1e293b !important;

        }

        .darkmode tr:hover{

        background:#334155 !important;

        }

        .darkmode p{

        color:#cbd5e1 !important;

        }

        .darkmode h1,

        .darkmode h2{

        color:white !important;

}
    </style>
  </head>

  <body id="body-app" class="font-sans text-slate-800 transition-all duration-300">
    <div class="min-h-screen">
      <!-- HEADER -->

      <div id="nav" class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-8 h-20 flex items-center justify-between">
        <div class="flex items-center gap-5">
        </div>
            <h1 class="text-3xl font-bold">Dashboard Antrean Premium</h1>

            <p class="text-slate-500">Sistem Antrean Klinik Modern</p>
          </div>
        </div>

        <div class="flex items-center gap-4">
        
        <button
        
        id="dark-toggle"
        
        class="bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-xl font-semibold"
        
        >
        
        🌙 Dark
        
        </button>

<div class="text-right">
        </div>
      </header>

      <!-- CONTENT -->

      <div class="max-w-7xl mx-auto p-8">
        <!-- STATISTIK -->

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="card p-6">
            <div class="flex justify-between">
              <div>
                <p class="text-slate-500">Total Peserta</p>

                <h2 id="stat-total" class="text-5xl font-bold mt-2">0</h2>
              </div>

              <div class="text-4xl">👥</div>
            </div>
          </div>

          <div class="card p-6">
            <div class="flex justify-between">
              <div>
                <p class="text-slate-500">Sedang Menunggu</p>

                <h2 id="stat-menunggu" class="text-5xl font-bold mt-2">0</h2>
              </div>

              <div class="text-4xl">⏳</div>
            </div>
          </div>

          <div class="card p-6 bg-blue-600 text-white">
            <div class="flex justify-between">
              <div>
                <p>Server</p>

                <h2 class="text-3xl font-bold mt-2">Aktif</h2>
              </div>

              <div class="text-4xl">🟢</div>
            </div>
          </div>
        </div>

        <!-- GRID -->

        <div class="grid lg:grid-cols-12 gap-8">
          <!-- FORM -->

          <div class="lg:col-span-4">
            <div class="card p-8 sticky top-8">
              <h2 class="text-2xl font-bold mb-2">Tambah Peserta</h2>

              <p class="text-slate-500 mb-8">Masukkan nama peserta baru</p>

              <form id="form-registrasi">
                <div>
                  <label class="font-medium mb-2 block"> Nama Peserta </label>

                  <input
                    id="input-nama"
                    required
                    type="text"
                    placeholder="Contoh : Ahmad Fauzi"
                    class="w-full border border-slate-300 rounded-xl p-4 outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500"
                  />
                </div>

                <button
                  type="submit"
                  class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold transition"
                >
                  ➕ Tambahkan Antrean
                </button>
              </form>
            </div>
          </div>

          <!-- TABEL -->

          <div class="lg:col-span-8">
            <div class="card overflow-hidden">
              <div class="p-8 border-b">
                <div
                  class="flex flex-col md:flex-row gap-4 md:items-center md:justify-between"
                >
                  <div>
                    <h2 class="text-2xl font-bold">Daftar Antrean</h2>

                    <p class="text-slate-500">Peserta yang sedang menunggu</p>
                  </div>

                  <div>
                    <input
                      id="search-peserta"
                      type="text"
                      placeholder="🔍 Cari peserta"
                      class="border border-slate-300 rounded-xl p-3 w-full md:w-72 outline-none focus:ring-4 focus:ring-blue-100"
                    />
                  </div>
                </div>
              </div>

              <div class="overflow-auto">
                <table class="w-full">
                  <thead class="bg-slate-100">
                    <tr>
                      <th class="text-left p-5">Nomor</th>

                      <th class="text-left p-5">Nama</th>

                      <th class="text-left p-5">Status</th>

                      <th class="text-right p-5">Aksi</th>
                    </tr>
                  </thead>

                  <tbody id="tabel-menunggu" class="divide-y"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>

    const tombolDark = document.getElementById('dark-toggle');

    const body = document.getElementById('body-app');

    if(localStorage.getItem('darkmode')==='aktif'){

    aktifkanDark();

    }

    tombolDark.addEventListener(

    'click',

    ()=>{

    if(

    body.classList.contains(

    'darkmode'

    )

    ){

    nonaktifkanDark();

    }else{

    aktifkanDark();

    }

    }

    );

    function aktifkanDark(){

    body.classList.add(

    'darkmode'

    );

    localStorage.setItem(

    'darkmode',

    'aktif'

    );

    tombolDark.innerHTML='☀️ Light';

    }

    function nonaktifkanDark(){

    body.classList.remove(

    'darkmode'

    );

    localStorage.removeItem(

    'darkmode'

    );

    tombolDark.innerHTML='🌙 Dark';

    }

    </script>
    <script src="js/admin.js"></script>
  </body>
</html>
